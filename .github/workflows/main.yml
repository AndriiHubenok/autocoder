name: AutoCodeGen
on:
  issues:
    types: [labeled]

jobs:
  generate_code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: AutoCoder Composite Action
        uses: AndriiHubenok/autocoder-action@v1
        with:
          GITHUB_TOKEN: $\{{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: $\{{ secrets.OPENAI_API_KEY }}
          LABEL: 'autocoder'
