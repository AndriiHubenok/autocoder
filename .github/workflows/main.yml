name: Access Issue Information
on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  code_generating:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'autocoder-bot')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x ./scripts/script.sh
        
      - name: Run interaction script
        id: generate_code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./scripts/script.sh ${{ env.GITHUB_TOKEN }} ${{ env.REPOSITORY }} ${{ env.ISSUE_NUMBER }} ${{ env.OPENAI_API_KEY }}
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: autocoder-artifact
          path: autocoder-bot/
          if-no-files-found: error
          
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: autocoder-artifact
          path: autocoder-artifact
          
      - name: Display Generated Code using the ls command
        run: ls -R ./autocoder-artifact

      - name: Commit Generated Code
        env:
          GIT_AUTHOR_NAME: autocoder-bot
          GIT_AUTHOR_EMAIL: actions@github.com
          GIT_COMMITTER_NAME: autocoder-bot
          GIT_COMMITTER_EMAIL: actions@github.com
        run: |
          git config --global user.name "autocoder-bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Add code generated by ChatGPT"
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: autocoder-branch-${{ github.event.issue.number }}
          base: main
          labels: autocoder-bot
